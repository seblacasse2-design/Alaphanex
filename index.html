<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini CRM - Gestion de Contacts</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f4f7fb;
      color: #1e293b;
    }

    .hidden {
      display: none !important;
    }

    /* LOGIN */

    .auth-container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: linear-gradient(135deg, #2563eb, #1e40af);
    }

    .auth-card {
      background: white;
      width: 100%;
      max-width: 420px;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    }

    .auth-card h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .auth-card p {
      color: #64748b;
      margin-bottom: 30px;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #dbe2ea;
      font-size: 15px;
      outline: none;
      transition: 0.2s;
    }

    .input-group input:focus,
    .input-group select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
    }

    .btn {
      border: none;
      cursor: pointer;
      padding: 14px 18px;
      border-radius: 12px;
      font-weight: 600;
      transition: 0.2s;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #0f172a;
    }

    .btn-secondary:hover {
      background: #cbd5e1;
    }

    .auth-buttons {
      display: flex;
      gap: 12px;
      margin-top: 10px;
    }

    .auth-buttons button {
      flex: 1;
    }

    /* DASHBOARD */

    .dashboard {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: #0f172a;
      color: white;
      padding: 30px 20px;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 40px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.05);
      cursor: pointer;
    }

    .menu-item:hover {
      background: rgba(255,255,255,0.1);
    }

    .main-content {
      flex: 1;
      padding: 30px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .search-filter {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      flex: 1;
    }

    .search-filter input,
    .search-filter select {
      padding: 12px 14px;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      background: white;
    }

    .search-filter input {
      min-width: 250px;
    }

    .table-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: #f8fafc;
      text-align: left;
      padding: 18px;
      font-size: 14px;
      color: #475569;
    }

    td {
      padding: 18px;
      border-top: 1px solid #eef2f7;
    }

    .status {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      display: inline-block;
    }

    .Nouveau {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .Connecté {
      background: #dcfce7;
      color: #15803d;
    }

    .Tentative {
      background: #fef3c7;
      color: #b45309;
    }

    .En-cours {
      background: #ede9fe;
      color: #6d28d9;
    }

    .Ouvert {
      background: #fee2e2;
      color: #b91c1c;
    }

    /* MODAL */

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-content {
      background: white;
      width: 100%;
      max-width: 500px;
      padding: 30px;
      border-radius: 20px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      align-items: center;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }

    @media(max-width: 900px) {
      .dashboard {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
      }

      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .search-filter input {
        min-width: unset;
        width: 100%;
      }

      table {
        display: block;
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="auth-container" id="loginPage">
    <div class="auth-card">
      <h1>Mini CRM</h1>
      <p>Gestion simplifiée de vos contacts</p>

      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="email@entreprise.com">
      </div>

      <div class="input-group">
        <label>Mot de passe</label>
        <input type="password" placeholder="••••••••">
      </div>

      <div class="auth-buttons">
        <button class="btn btn-primary" onclick="login()">
          Se connecter
        </button>

        <button class="btn btn-secondary">
          S'inscrire
        </button>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard hidden" id="dashboard">

    <div class="sidebar">
      <div class="logo">📇 Mini CRM</div>

      <div class="menu-item">
        👥 Contacts
      </div>

      <div class="menu-item">
        📊 Tableau de bord
      </div>

      <div class="menu-item">
        ⚙️ Paramètres
      </div>
    </div>

    <div class="main-content">

      <div class="topbar">

        <div class="search-filter">
          <input
            type="text"
            id="searchInput"
            placeholder="Rechercher un contact..."
            onkeyup="renderContacts()"
          >

          <select id="statusFilter" onchange="renderContacts()">
            <option value="">Tous les statuts</option>
            <option value="Connecté">Connecté</option>
            <option value="Tentative">Tentative</option>
            <option value="En cours">En cours</option>
            <option value="Ouvert">Ouvert</option>
            <option value="Nouveau">Nouveau</option>
          </select>
        </div>

        <button class="btn btn-primary" onclick="openModal()">
          + Ajouter un contact
        </button>

      </div>

      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Nom</th>
              <th>Email</th>
              <th>Téléphone</th>
              <th>Statut</th>
              <th>Date de création</th>
            </tr>
          </thead>

          <tbody id="contactsTable"></tbody>
        </table>
      </div>

    </div>
  </div>

  <!-- MODAL -->
  <div class="modal hidden" id="contactModal">

    <div class="modal-content">

      <div class="modal-header">
        <h2>Ajouter un contact</h2>

        <button class="close-btn" onclick="closeModal()">
          ×
        </button>
      </div>

      <div class="input-group">
        <label>Nom</label>
        <input type="text" id="name">
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email">
      </div>

      <div class="input-group">
        <label>Téléphone</label>
        <input type="text" id="phone">
      </div>

      <div class="input-group">
        <label>Statut</label>

        <select id="status">
          <option>Connecté</option>
          <option>Tentative</option>
          <option>En cours</option>
          <option>Ouvert</option>
          <option selected>Nouveau</option>
        </select>
      </div>

      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">
          Annuler
        </button>

        <button class="btn btn-primary" onclick="addContact()">
          Ajouter
        </button>
      </div>

    </div>

  </div>

  <script>
    let contacts = [
      {
        name: "Jean Tremblay",
        email: "jean@entreprise.com",
        phone: "514-555-1234",
        status: "Connecté",
        created: "2026-05-28"
      },
      {
        name: "Sophie Martin",
        email: "sophie@abc.ca",
        phone: "438-555-8888",
        status: "Tentative",
        created: "2026-05-27"
      },
      {
        name: "Marc Gagnon",
        email: "marc@industrie.ca",
        phone: "450-555-1111",
        status: "Nouveau",
        created: "2026-05-25"
      }
    ];

    function login() {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      renderContacts();
    }

    function openModal() {
      document.getElementById('contactModal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('contactModal').classList.add('hidden');
    }

    function addContact() {

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const status = document.getElementById('status').value;

      if(!name || !email) {
        alert("Veuillez remplir les champs requis.");
        return;
      }

      contacts.unshift({
        name,
        email,
        phone,
        status,
        created: new Date().toISOString().split('T')[0]
      });

      renderContacts();
      closeModal();

      document.getElementById('name').value = '';
      document.getElementById('email').value = '';
      document.getElementById('phone').value = '';
      document.getElementById('status').value = 'Nouveau';
    }

    function renderContacts() {

      const search = document
        .getElementById('searchInput')
        .value
        .toLowerCase();

      const statusFilter = document
        .getElementById('statusFilter')
        .value;

      const filtered = contacts.filter(contact => {

        const matchesSearch =
          contact.name.toLowerCase().includes(search) ||
          contact.email.toLowerCase().includes(search);

        const matchesStatus =
          !statusFilter || contact.status === statusFilter;

        return matchesSearch && matchesStatus;
      });

      const table = document.getElementById('contactsTable');

      table.innerHTML = filtered.map(contact => `
        <tr>
          <td>${contact.name}</td>
          <td>${contact.email}</td>
          <td>${contact.phone}</td>
          <td>
            <span class="status ${contact.status.replace(' ', '-')}">
              ${contact.status}
            </span>
          </td>
          <td>${contact.created}</td>
        </tr>
      `).join('');
    }
  </script>

</body>
</html>
