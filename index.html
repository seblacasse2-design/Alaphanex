<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContactFlow - Gestion de Contacts</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        * {
            font-family: 'Poppins', sans-serif;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .float-animation {
            animation: float 6s ease-in-out infinite;
        }
        
        .animate-slide-in {
            animation: slideInUp 0.3s ease-out;
        }
        
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        /* Icônes SVG inline */
        .icon {
            display: inline-block;
            width: 1.25rem;
            height: 1.25rem;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            vertical-align: -0.125em;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // Composants d'icônes
        const Users = ({ size = 24, className = "" }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
        );

        const LogOut = ({ size = 24, className = "" }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
        );

        const Plus = ({ size = 24, className = "" }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        );

        const Trash2 = ({ size = 24, className = "" }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
        );

        const Search = ({ size = 24, className = "" }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        );

        const Filter = ({ size = 24, className = "" }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
            </svg>
        );

        const Mail = ({ size = 24, className = "" }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                <path d="m22 7-10 5L2 7"></path>
            </svg>
        );

        const Phone = ({ size = 24, className = "" }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
            </svg>
        );

        const Calendar = ({ size = 24, className = "" }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
        );

        // Composant principal
        const ContactsApp = () => {
            // État d'authentification
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [currentUser, setCurrentUser] = useState(null);
            const [loginForm, setLoginForm] = useState({ email: '', password: '' });

            // État des contacts
            const [contacts, setContacts] = useState([
                { id: 1, name: 'Marie Dupont', email: 'marie.dupont@email.com', phone: '+33 6 12 34 56 78', status: 'Connecté', createdAt: '2024-01-15' },
                { id: 2, name: 'Thomas Martin', email: 'thomas.martin@email.com', phone: '+33 6 98 76 54 32', status: 'En cours', createdAt: '2024-01-18' },
                { id: 3, name: 'Sophie Bernard', email: 'sophie.bernard@email.com', phone: '+33 7 11 22 33 44', status: 'Nouveau', createdAt: '2024-01-20' },
                { id: 4, name: 'Jean Leclerc', email: 'jean.leclerc@email.com', phone: '+33 7 55 66 77 88', status: 'Ouvert', createdAt: '2024-01-22' },
            ]);

            // État du formulaire d'ajout
            const [showAddModal, setShowAddModal] = useState(false);
            const [newContact, setNewContact] = useState({ name: '', email: '', phone: '', status: 'Nouveau' });

            // État du filtre et recherche
            const [selectedStatus, setSelectedStatus] = useState('Tous');
            const [searchTerm, setSearchTerm] = useState('');

            const statuses = ['Tous', 'Connecté', 'Tentative', 'En cours', 'Ouvert', 'Nouveau'];
            const statusColors = {
                'Connecté': 'bg-emerald-100 text-emerald-800',
                'Tentative': 'bg-orange-100 text-orange-800',
                'En cours': 'bg-blue-100 text-blue-800',
                'Ouvert': 'bg-amber-100 text-amber-800',
                'Nouveau': 'bg-violet-100 text-violet-800',
            };

            // Filtrer et chercher les contacts
            const filteredContacts = useMemo(() => {
                return contacts.filter(contact => {
                    const matchesStatus = selectedStatus === 'Tous' || contact.status === selectedStatus;
                    const matchesSearch = contact.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                       contact.email.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                       contact.phone.includes(searchTerm);
                    return matchesStatus && matchesSearch;
                });
            }, [contacts, selectedStatus, searchTerm]);

            // Gestion de la connexion
            const handleLogin = (e) => {
                e.preventDefault();
                if (loginForm.email && loginForm.password) {
                    setIsAuthenticated(true);
                    setCurrentUser(loginForm.email);
                    setLoginForm({ email: '', password: '' });
                }
            };

            const handleSignup = (e) => {
                e.preventDefault();
                if (loginForm.email && loginForm.password) {
                    setIsAuthenticated(true);
                    setCurrentUser(loginForm.email);
                    setLoginForm({ email: '', password: '' });
                }
            };

            const handleLogout = () => {
                setIsAuthenticated(false);
                setCurrentUser(null);
                setContacts([]);
            };

            // Gestion des contacts
            const handleAddContact = (e) => {
                e.preventDefault();
                if (newContact.name && newContact.email) {
                    const contact = {
                        id: Math.max(...contacts.map(c => c.id), 0) + 1,
                        ...newContact,
                        createdAt: new Date().toISOString().split('T')[0],
                    };
                    setContacts([...contacts, contact]);
                    setNewContact({ name: '', email: '', phone: '', status: 'Nouveau' });
                    setShowAddModal(false);
                }
            };

            const handleDeleteContact = (id) => {
                setContacts(contacts.filter(c => c.id !== id));
            };

            // Page de connexion
            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center p-4 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-96 h-96 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 float-animation" style={{zIndex: -10}}></div>
                        <div className="absolute -bottom-8 right-0 w-96 h-96 bg-cyan-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20 float-animation" style={{zIndex: -10, animationDelay: '2s'}}></div>

                        <div className="w-full max-w-md">
                            <div className="backdrop-blur-xl bg-white/5 border border-white/10 rounded-2xl p-8 shadow-2xl">
                                {/* Header */}
                                <div className="text-center mb-8">
                                    <div className="flex justify-center mb-4">
                                        <div className="w-12 h-12 bg-gradient-to-br from-blue-400 to-cyan-400 rounded-xl flex items-center justify-center">
                                            <Users size={24} className="text-white" />
                                        </div>
                                    </div>
                                    <h1 className="text-3xl font-bold text-white mb-2">ContactFlow</h1>
                                    <p className="text-slate-400">Gérez vos contacts en toute simplicité</p>
                                </div>

                                {/* Tabs */}
                                <div className="flex gap-0 mb-6 border-b border-white/10">
                                    <button className="flex-1 py-3 px-4 text-white border-b-2 border-blue-400 font-medium text-sm">
                                        Connexion
                                    </button>
                                    <button className="flex-1 py-3 px-4 text-slate-400 hover:text-slate-300 font-medium text-sm transition-colors">
                                        Inscription
                                    </button>
                                </div>

                                {/* Formulaire de connexion */}
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <div>
                                        <label className="block text-slate-300 text-sm font-medium mb-2">Email</label>
                                        <input
                                            type="email"
                                            value={loginForm.email}
                                            onChange={(e) => setLoginForm({ ...loginForm, email: e.target.value })}
                                            placeholder="vous@exemple.com"
                                            className="w-full px-4 py-2.5 bg-white/10 border border-white/20 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-blue-400 focus:bg-white/15 transition-all"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-slate-300 text-sm font-medium mb-2">Mot de passe</label>
                                        <input
                                            type="password"
                                            value={loginForm.password}
                                            onChange={(e) => setLoginForm({ ...loginForm, password: e.target.value })}
                                            placeholder="••••••••"
                                            className="w-full px-4 py-2.5 bg-white/10 border border-white/20 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-blue-400 focus:bg-white/15 transition-all"
                                        />
                                    </div>
                                    <button
                                        type="submit"
                                        className="w-full py-2.5 px-4 bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 text-white font-semibold rounded-lg transition-all transform hover:scale-105 active:scale-95 shadow-lg"
                                    >
                                        Se connecter
                                    </button>
                                </form>

                                <div className="mt-6 text-center text-slate-400 text-sm">
                                    Pas encore de compte ? {' '}
                                    <button
                                        onClick={handleSignup}
                                        className="text-blue-400 hover:text-blue-300 font-semibold transition-colors"
                                    >
                                        S'inscrire gratuitement
                                    </button>
                                </div>
                            </div>

                            {/* Footer */}
                            <p className="text-center text-slate-500 text-xs mt-6">
                                Version démo • Données en session
                            </p>
                        </div>
                    </div>
                );
            }

            // Tableau de bord principal
            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-slate-50">
                    {/* Header */}
                    <div className="sticky top-0 z-50 backdrop-blur-md bg-white/80 border-b border-slate-200/50 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-gradient-to-br from-blue-500 to-cyan-500 rounded-xl flex items-center justify-center shadow-lg">
                                    <Users size={22} className="text-white" />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold bg-gradient-to-r from-blue-600 to-cyan-600 bg-clip-text text-transparent">
                                        ContactFlow
                                    </h1>
                                </div>
                            </div>

                            <button
                                onClick={handleLogout}
                                className="flex items-center gap-2 px-4 py-2 text-slate-700 hover:bg-red-50 hover:text-red-600 rounded-lg transition-all font-medium"
                            >
                                <LogOut size={18} />
                                <span className="hidden sm:inline">Déconnexion</span>
                            </button>
                        </div>
                    </div>

                    {/* Contenu principal */}
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        {/* Section supérieure */}
                        <div className="mb-8 animate-slide-in">
                            <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-6">
                                <div>
                                    <h2 className="text-3xl font-bold text-slate-900">Mes contacts</h2>
                                    <p className="text-slate-600 mt-1">
                                        {filteredContacts.length} contact{filteredContacts.length > 1 ? 's' : ''} trouvé{filteredContacts.length > 1 ? 's' : ''}
                                    </p>
                                </div>
                                <button
                                    onClick={() => setShowAddModal(true)}
                                    className="flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 text-white font-semibold rounded-lg shadow-lg hover:shadow-xl transition-all transform hover:scale-105 active:scale-95"
                                >
                                    <Plus size={20} />
                                    Ajouter un contact
                                </button>
                            </div>

                            {/* Barre de recherche et filtres */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                {/* Recherche */}
                                <div className="md:col-span-1 relative">
                                    <Search size={18} className="absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400" />
                                    <input
                                        type="text"
                                        placeholder="Chercher par nom, email..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        className="w-full pl-10 pr-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 bg-white transition-all"
                                    />
                                </div>

                                {/* Filtres de statut */}
                                <div className="md:col-span-2 flex flex-wrap gap-2">
                                    {statuses.map((status) => (
                                        <button
                                            key={status}
                                            onClick={() => setSelectedStatus(status)}
                                            className={`flex items-center gap-1.5 px-4 py-2.5 rounded-lg font-medium transition-all transform ${
                                                selectedStatus === status
                                                    ? 'bg-blue-500 text-white shadow-lg scale-105'
                                                    : 'bg-white border border-slate-300 text-slate-700 hover:border-blue-400 hover:bg-blue-50'
                                            }`}
                                        >
                                            <Filter size={16} />
                                            {status}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Liste des contacts */}
                        <div className="animate-fade-in">
                            {filteredContacts.length > 0 ? (
                                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                    {/* En-têtes pour desktop */}
                                    <div className="hidden sm:grid grid-cols-12 gap-4 px-6 py-4 bg-slate-50 border-b border-slate-200 font-semibold text-slate-700 text-sm">
                                        <div className="col-span-3">Nom</div>
                                        <div className="col-span-3">Email</div>
                                        <div className="col-span-2">Téléphone</div>
                                        <div className="col-span-2">Statut</div>
                                        <div className="col-span-2">Actions</div>
                                    </div>

                                    {/* Lignes de contacts */}
                                    <div className="divide-y divide-slate-200">
                                        {filteredContacts.map((contact, index) => (
                                            <div
                                                key={contact.id}
                                                className="p-6 hover:bg-blue-50/30 transition-colors animate-slide-in"
                                                style={{ animationDelay: `${index * 50}ms` }}
                                            >
                                                {/* Affichage Desktop */}
                                                <div className="hidden sm:grid grid-cols-12 gap-4 items-center">
                                                    <div className="col-span-3">
                                                        <p className="font-semibold text-slate-900">{contact.name}</p>
                                                    </div>
                                                    <div className="col-span-3">
                                                        <div className="flex items-center gap-2 text-slate-600">
                                                            <Mail size={16} />
                                                            <a href={`mailto:${contact.email}`} className="hover:text-blue-600 transition-colors">
                                                                {contact.email}
                                                            </a>
                                                        </div>
                                                    </div>
                                                    <div className="col-span-2">
                                                        <div className="flex items-center gap-2 text-slate-600">
                                                            <Phone size={16} />
                                                            {contact.phone}
                                                        </div>
                                                    </div>
                                                    <div className="col-span-2">
                                                        <span className={`inline-block px-3 py-1 rounded-full text-xs font-semibold ${statusColors[contact.status]}`}>
                                                            {contact.status}
                                                        </span>
                                                    </div>
                                                    <div className="col-span-2 flex items-center gap-2">
                                                        <button
                                                            onClick={() => handleDeleteContact(contact.id)}
                                                            className="p-2 text-red-500 hover:bg-red-50 rounded-lg transition-colors"
                                                        >
                                                            <Trash2 size={18} />
                                                        </button>
                                                    </div>
                                                </div>

                                                {/* Affichage Mobile */}
                                                <div className="sm:hidden space-y-3">
                                                    <div className="flex items-start justify-between">
                                                        <div>
                                                            <p className="font-semibold text-slate-900 text-lg">{contact.name}</p>
                                                            <span className={`inline-block mt-2 px-3 py-1 rounded-full text-xs font-semibold ${statusColors[contact.status]}`}>
                                                                {contact.status}
                                                            </span>
                                                        </div>
                                                        <button
                                                            onClick={() => handleDeleteContact(contact.id)}
                                                            className="p-2 text-red-500 hover:bg-red-50 rounded-lg transition-colors"
                                                        >
                                                            <Trash2 size={18} />
                                                        </button>
                                                    </div>
                                                    <div className="space-y-2 text-sm">
                                                        <div className="flex items-center gap-2 text-slate-600">
                                                            <Mail size={16} />
                                                            <a href={`mailto:${contact.email}`} className="hover:text-blue-600 transition-colors break-all">
                                                                {contact.email}
                                                            </a>
                                                        </div>
                                                        <div className="flex items-center gap-2 text-slate-600">
                                                            <Phone size={16} />
                                                            {contact.phone}
                                                        </div>
                                                        <div className="flex items-center gap-2 text-slate-500 text-xs">
                                                            <Calendar size={14} />
                                                            {new Date(contact.createdAt).toLocaleDateString('fr-FR')}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <div className="text-center py-16 bg-white rounded-xl border border-slate-200">
                                    <Users size={48} className="mx-auto text-slate-400 mb-4" />
                                    <h3 className="text-xl font-semibold text-slate-900 mb-2">Aucun contact trouvé</h3>
                                    <p className="text-slate-600 mb-6">
                                        {searchTerm || selectedStatus !== 'Tous'
                                            ? 'Essayez de modifier votre recherche ou vos filtres'
                                            : 'Commencez par ajouter votre premier contact'}
                                    </p>
                                    {(searchTerm || selectedStatus !== 'Tous') && (
                                        <button
                                            onClick={() => {
                                                setSearchTerm('');
                                                setSelectedStatus('Tous');
                                            }}
                                            className="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors font-medium"
                                        >
                                            Réinitialiser les filtres
                                        </button>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Modal d'ajout de contact */}
                    {showAddModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 animate-slide-in">
                                <h2 className="text-2xl font-bold text-slate-900 mb-6">Ajouter un contact</h2>

                                <form onSubmit={handleAddContact} className="space-y-4">
                                    <div>
                                        <label className="block text-slate-700 font-semibold mb-2">Nom complet *</label>
                                        <input
                                            type="text"
                                            value={newContact.name}
                                            onChange={(e) => setNewContact({ ...newContact, name: e.target.value })}
                                            placeholder="Ex: Jean Dupont"
                                            className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
                                            required
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-slate-700 font-semibold mb-2">Email *</label>
                                        <input
                                            type="email"
                                            value={newContact.email}
                                            onChange={(e) => setNewContact({ ...newContact, email: e.target.value })}
                                            placeholder="jean@exemple.com"
                                            className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
                                            required
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-slate-700 font-semibold mb-2">Téléphone</label>
                                        <input
                                            type="tel"
                                            value={newContact.phone}
                                            onChange={(e) => setNewContact({ ...newContact, phone: e.target.value })}
                                            placeholder="+33 6 12 34 56 78"
                                            className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-slate-700 font-semibold mb-2">Statut du lead</label>
                                        <select
                                            value={newContact.status}
                                            onChange={(e) => setNewContact({ ...newContact, status: e.target.value })}
                                            className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
                                        >
                                            {['Nouveau', 'Ouvert', 'En cours', 'Tentative', 'Connecté'].map((status) => (
                                                <option key={status} value={status}>
                                                    {status}
                                                </option>
                                            ))}
                                        </select>
                                    </div>

                                    <div className="flex gap-3 pt-4">
                                        <button
                                            type="button"
                                            onClick={() => setShowAddModal(false)}
                                            className="flex-1 px-4 py-2.5 border border-slate-300 text-slate-700 font-semibold rounded-lg hover:bg-slate-50 transition-colors"
                                        >
                                            Annuler
                                        </button>
                                        <button
                                            type="submit"
                                            className="flex-1 px-4 py-2.5 bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 text-white font-semibold rounded-lg transition-all transform hover:scale-105 active:scale-95"
                                        >
                                            Ajouter
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // Monter le composant
        ReactDOM.render(<ContactsApp />, document.getElementById('root'));
    </script>
</body>
</html>
